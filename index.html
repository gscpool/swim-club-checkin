<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Gibsonville Swim Club</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐊</text></svg>">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
:root{
  --or:#FA4616;--ord:#c93a12;--orl:#fff0ec;
  --bl:#003087;--bld:#00205c;--bll:#dce6f7;
  --wh:#fff;--sand:#fdf8f4;--sand2:#f0e9e1;
  --tx:#1a1a2e;--mu:#6b7280;
  --gr:#166534;--grl:#dcfce7;
  --re:#991b1b;--rel:#fee2e2;
  --am:#92400e;--aml:#fef3c7;
  --pu:#5b21b6;--pul:#ede9ff;
  --r:13px;--sh:0 3px 16px rgba(0,48,135,.11);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:var(--sand);color:var(--tx);min-height:100vh;overscroll-behavior:none}
#pin-screen{position:fixed;inset:0;z-index:9999;background:var(--bld);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:40px 24px}
#pin-screen.hidden{display:none!important;pointer-events:none!important}
.pin-logo{font-family:'Inter',sans-serif;color:var(--or);font-size:24px;text-align:center;line-height:1.2;font-weight:800;letter-spacing:-.5px}
.pin-logo em{display:block;font-family:'Inter',sans-serif;font-size:11px;color:rgba(255,255,255,.5);margin-top:3px;letter-spacing:2px;text-transform:uppercase;font-style:normal;font-weight:600}
.pin-dots{display:flex;gap:14px}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.3);background:transparent;transition:all .15s}
.pin-dot.on{background:var(--or);border-color:var(--or)}
.pin-pad{display:grid;grid-template-columns:repeat(3,68px);gap:10px}
.pk{width:68px;height:68px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.14);color:#fff;font-size:22px;font-family:'Inter',sans-serif;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s}
.pk:active{background:var(--or);transform:scale(.93)}
.pin-err{color:#fca5a5;font-size:13px;min-height:18px;text-align:center}
#setup-banner{background:#fff8e1;border-bottom:3px solid var(--or);padding:9px 14px;font-size:12px;color:#7c4a00;display:none;text-align:center;line-height:1.5}
#setup-banner.show{display:block}
#app{display:flex;flex-direction:column;height:100dvh}
.topbar{background:var(--bld);color:#fff;padding:11px 14px 9px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:3px solid var(--or)}
.topbar-l{display:flex;align-items:center;gap:9px}
.topbar-title{font-family:'Inter',sans-serif;font-size:20px;color:var(--or);line-height:1.2;font-weight:600;letter-spacing:-.2px}
.topbar-sub{font-size:10px;color:rgba(255,255,255,.45);letter-spacing:1.5px;text-transform:uppercase}
.topbar-acts{display:flex;gap:5px}
.ibtn{background:rgba(255,255,255,.1);border:none;color:#fff;width:35px;height:35px;border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px}
.ibtn:active{background:var(--or)}
.tabs{background:var(--bl);display:flex;flex-shrink:0}
.tab{flex:1;padding:13px 4px;border:none;background:none;font-family:'Inter',sans-serif;font-size:15px;font-weight:600;color:rgba(255,255,255,.55);cursor:pointer;border-bottom:3px solid transparent;transition:color .14s,border-color .14s;letter-spacing:.3px;text-transform:uppercase}
.tab.on{color:var(--or);border-bottom-color:var(--or);font-weight:800;background:rgba(255,255,255,.06)}
.pane{display:none;flex:1;overflow-y:auto;flex-direction:column}
.pane.on{display:flex}
.sbar{background:var(--sand);padding:14px 13px;border-bottom:2px solid var(--sand2);display:flex;gap:7px;align-items:center;flex-shrink:0}
.sinput{flex:1;padding:13px 15px;border:2.5px solid var(--bl);border-radius:11px;font-size:17px;font-family:'Inter',sans-serif;background:var(--wh);outline:none;color:var(--tx);transition:border-color .15s,box-shadow .15s;box-shadow:0 2px 8px rgba(0,48,135,.12)}
.sinput:focus{border-color:var(--or);background:var(--wh);box-shadow:0 2px 12px rgba(250,70,22,.18)}
.sclr{background:none;border:none;font-size:18px;color:var(--mu);cursor:pointer;padding:5px}
.rlist{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:7px}
.mcard{background:var(--wh);border-radius:var(--r);padding:12px 13px;box-shadow:var(--sh);display:flex;align-items:center;gap:11px;cursor:pointer;transition:transform .1s;border-left:4px solid var(--bll)}
.mcard:active{transform:scale(.98)}
.mcard.st-unpaid{border-left-color:var(--re);background:var(--rel)}
.mcard.st-pending{border-left-color:var(--am);background:var(--aml)}
.mcard.st-paid{border-left-color:var(--bl)}
.mcard.st-comp{border-left-color:var(--pu)}
.mcard.st-board{border-left-color:var(--or)}
.mavatar{width:44px;height:44px;border-radius:50%;background:var(--bld);display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;font-size:17px;color:var(--or);flex-shrink:0;border:2px solid var(--or)}
.minfo{flex:1;min-width:0}
.mname{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.2px}
.mmeta{font-size:11px;color:var(--mu);display:flex;gap:5px;flex-wrap:wrap;margin-top:2px;align-items:center}
.mroster{font-size:11px;color:var(--mu);margin-top:2px}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.b-paid{background:var(--grl);color:var(--gr)}.b-unpaid{background:var(--rel);color:var(--re)}.b-pending{background:var(--aml);color:var(--am)}
.b-ind{background:var(--bll);color:var(--bl)}.b-couples{background:#ede9ff;color:#4a0080}.b-family{background:var(--orl);color:var(--ord)}.b-boardtype{background:var(--aml);color:var(--am)}.b-comptype{background:#f3f4f6;color:#374151}
.gchip{font-size:11px;font-weight:700;padding:4px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;background:var(--bll);color:var(--bl)}
.gchip.low{background:var(--aml);color:var(--am)}.gchip.gone{background:var(--rel);color:var(--re)}.gchip.none{background:#f3f4f6;color:#9ca3af}
.dir-controls{background:var(--wh);padding:10px 13px;border-bottom:1px solid var(--sand2);display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.dir-filters{display:flex;gap:5px;flex-wrap:wrap}
.fbtn{padding:5px 10px;border-radius:20px;border:2px solid var(--sand2);background:var(--sand);font-size:11px;font-weight:700;color:var(--mu);cursor:pointer;transition:all .12s;text-transform:uppercase;letter-spacing:.4px}
.alpha-btn{width:28px;height:28px;border-radius:7px;border:1.5px solid var(--sand2);background:var(--sand);font-size:12px;font-weight:700;color:var(--bl);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0}
.alpha-btn.on{background:var(--or);border-color:var(--or);color:#fff}
.alpha-btn.empty{color:var(--sand2);border-color:var(--sand2);cursor:default}
.fbtn.on{background:var(--bl);border-color:var(--bl);color:#fff}
.dlist{flex:1;overflow-y:auto;padding:8px 10px 80px}
.alpha-hdr{font-family:'Inter',sans-serif;font-size:20px;color:var(--or);padding:8px 4px 2px;position:sticky;top:0;background:var(--sand);z-index:1;font-weight:800;letter-spacing:-.3px}
.overlay{position:fixed;inset:0;background:rgba(0,32,92,.5);z-index:100;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{opacity:1;pointer-events:all}
.sheet{background:var(--wh);width:100%;border-radius:20px 20px 0 0;padding:0 0 36px;max-height:94dvh;overflow-y:auto;transform:translateY(100%);transition:transform .25s cubic-bezier(.32,1,.4,1)}
.overlay.open .sheet{transform:translateY(0)}
.mhandle{width:36px;height:4px;border-radius:2px;background:var(--sand2);margin:11px auto 0}
.mhdr{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--sand2)}
.mtitle{font-family:'Inter',sans-serif;font-size:20px;color:var(--bld);font-weight:800;letter-spacing:-.3px}
.mclose{background:var(--sand);border:none;width:32px;height:32px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--mu)}
.mbody{padding:13px 16px;display:flex;flex-direction:column;gap:12px}
.irow{display:flex;gap:9px;align-items:flex-start}
.ilbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--mu);width:80px;flex-shrink:0;padding-top:2px}
.ival{font-size:14px;color:var(--tx);flex:1;font-weight:500}
.ci-panel{background:linear-gradient(135deg,var(--bld),var(--bl));border-radius:13px;padding:14px;display:flex;flex-direction:column;gap:11px}
.ci-title{font-family:'Inter',sans-serif;font-size:17px;color:var(--or);font-weight:800;letter-spacing:.3px}
.ci-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.ci-lbl{font-size:13px;color:rgba(255,255,255,.85);font-weight:600}
.ci-sub{font-size:11px;color:rgba(255,255,255,.55);margin-top:1px}
.ctr{display:flex;align-items:center;gap:10px}
.cbtn{width:36px;height:36px;border-radius:50%;background:var(--or);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.cval{font-size:24px;font-weight:700;color:#fff;min-width:26px;text-align:center;font-family:'Inter',sans-serif}
.ci-already{font-size:12px;color:#86efac;font-weight:700}
.ci-blocked{background:var(--rel);border:2px solid var(--re);border-radius:11px;padding:13px;color:var(--re);font-weight:700;text-align:center;font-size:14px}
.ci-checkin-btn{width:100%;padding:13px;border-radius:11px;background:var(--or);border:none;color:#fff;font-size:16px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer}
.ci-checkin-btn:active{background:var(--ord)}
.ci-over-note{background:rgba(250,70,22,.25);border-radius:8px;padding:8px 10px;font-size:12px;color:#ffd4c8;font-weight:600;line-height:1.4}
.ci-checklist{display:flex;flex-direction:column;gap:6px}
.ci-check-item{display:flex;align-items:center;gap:10px;padding:9px 11px;background:rgba(255,255,255,.12);border-radius:9px;cursor:pointer;border:1.5px solid rgba(255,255,255,.15);transition:all .12s}
.ci-check-item:active{background:rgba(255,255,255,.2)}
.ci-check-item.checked{background:rgba(134,239,172,.2);border-color:rgba(134,239,172,.5)}
.ci-check-item input[type=checkbox]{width:20px;height:20px;accent-color:#FA4616;cursor:pointer;flex-shrink:0;border-radius:5px}
.ci-check-item label{font-size:14px;color:#fff;font-weight:600;cursor:pointer;flex:1;line-height:1.3}
.ci-check-item.missing-name{background:rgba(250,70,22,.2);border-color:rgba(250,70,22,.4)}
.ci-section-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.55);margin-top:2px}
.ci-add-btn{display:flex;align-items:center;gap:6px;padding:8px 11px;background:rgba(255,255,255,.08);border:1.5px dashed rgba(255,255,255,.3);border-radius:9px;cursor:pointer;font-size:13px;color:rgba(255,255,255,.7);font-family:Inter,sans-serif;font-weight:600;width:100%;text-align:left}
.ci-add-btn:active{background:rgba(255,255,255,.15)}
.ci-inline-input{flex:1;padding:7px 10px;border:1.5px solid rgba(255,255,255,.4);border-radius:7px;font-size:13px;background:rgba(255,255,255,.15);color:#fff;outline:none;font-family:Inter,sans-serif}
.incomplete-banner{background:var(--aml);border:2px solid var(--am);border-radius:11px;padding:12px 14px;display:flex;flex-direction:column;gap:8px;margin-bottom:8px}
.incomplete-banner-title{font-weight:700;font-size:13px;color:var(--am)}
.incomplete-field{display:flex;align-items:center;gap:8px}
.incomplete-field input{flex:1;padding:8px 10px;border:1.5px solid var(--am);border-radius:8px;font-size:14px;font-family:'Inter',sans-serif;background:#fff;outline:none;color:var(--tx)}
.fill-btn{padding:9px 14px;background:var(--am);border:none;color:#fff;border-radius:8px;font-size:13px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;align-self:flex-start}
.unpaid-warning{background:#fff0ec;border:2px solid var(--or);border-radius:11px;padding:12px;text-align:center;display:flex;flex-direction:column;gap:5px}
.unpaid-warning-title{font-family:'Inter',sans-serif;font-size:14px;color:var(--or)}
.unpaid-warning p{font-size:12px;color:var(--tx);line-height:1.4}
.unpaid-days{font-size:26px;font-weight:700;color:var(--re);font-family:'Inter',sans-serif}
.gp-counter-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.gp-counter-status{font-size:11px;font-weight:700;border-radius:20px;padding:3px 9px;display:inline-block}
.gp-status-ok{background:rgba(255,255,255,.15);color:rgba(255,255,255,.85)}
.gp-status-over{background:rgba(153,27,27,.4);color:#fca5a5}
#gp-overlay .sheet{background:var(--bld)}
#gp-overlay .mhdr{border-bottom-color:rgba(255,255,255,.15)}
#gp-overlay .mtitle{color:var(--or)}
#gp-overlay .mclose{background:rgba(255,255,255,.1);color:#fff}
.gp-body{padding:18px 16px 8px;display:flex;flex-direction:column;align-items:center;gap:13px;text-align:center}
.gp-icon{font-size:50px}
.gp-headline{font-family:'Inter',sans-serif;font-size:21px;color:#fff;line-height:1.2}
.gp-detail{font-size:14px;color:rgba(255,255,255,.65);line-height:1.5}
.gp-breakdown{background:rgba(255,255,255,.07);border-radius:10px;padding:12px 16px;width:100%;display:flex;flex-direction:column;gap:6px}
.gp-line{display:flex;justify-content:space-between;font-size:13px;color:rgba(255,255,255,.8);font-weight:600}
.gp-total{display:flex;justify-content:space-between;font-size:17px;color:#fff;font-weight:700;border-top:1px solid rgba(255,255,255,.2);padding-top:8px;margin-top:2px}
.gp-total span:last-child{color:var(--or);font-family:'Inter',sans-serif}
.gp-btns{display:flex;flex-direction:column;gap:8px;width:100%;padding-bottom:4px}
.gp-buy{width:100%;padding:14px;border-radius:12px;background:var(--or);border:none;color:#fff;font-size:17px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer}
.gp-skip{width:100%;padding:12px;border-radius:12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.55);font-size:14px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer}
.nanny-card{background:var(--orl);border:2px solid var(--or);border-radius:12px;padding:12px 14px;display:flex;flex-direction:column;gap:6px}
.nanny-title{font-family:'Inter',sans-serif;font-size:14px;color:var(--ord);margin-bottom:2px}
.nanny-row{display:flex;gap:8px;align-items:baseline}
.nanny-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--or);width:50px;flex-shrink:0}
.nanny-val{font-size:13px;color:var(--tx);font-weight:500}
.toggle-wrap{position:relative;display:inline-block;width:46px;height:26px;flex-shrink:0}
.toggle-wrap input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:var(--sand2);border-radius:26px;transition:.2s}
.toggle-slider:before{position:absolute;content:"";height:20px;width:20px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
.toggle-wrap input:checked+.toggle-slider{background:var(--or)}
.toggle-wrap input:checked+.toggle-slider:before{transform:translateX(20px)}
.vlog{display:flex;flex-direction:column;gap:4px;max-height:160px;overflow-y:auto}
.vitem{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:5px 0;border-bottom:1px solid var(--sand2)}
.vitem:last-child{border-bottom:none}
.fg{display:flex;flex-direction:column;gap:5px}
.fl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--mu)}
.fi,.fs{padding:11px 13px;border:2px solid var(--sand2);border-radius:10px;font-size:16px;font-family:'Inter',sans-serif;color:var(--tx);background:var(--sand);outline:none;width:100%;transition:border-color .15s}
.fi:focus,.fs:focus{border-color:var(--bl);background:var(--wh)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-p{width:100%;padding:13px;border-radius:11px;background:var(--bl);border:none;color:#fff;font-size:16px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer}
.btn-s{width:100%;padding:11px;border-radius:11px;background:var(--sand);border:2px solid var(--sand2);color:var(--tx);font-size:14px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer}
.btn-d{width:100%;padding:11px;border-radius:11px;background:var(--rel);border:2px solid var(--re);color:var(--re);font-size:14px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer}
.btn-o{width:100%;padding:11px;border-radius:11px;background:var(--orl);border:2px solid var(--or);color:var(--ord);font-size:14px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer}
.sec-lbl{font-size:11px;font-weight:700;color:var(--bld);border-bottom:2px solid var(--sand2);padding-bottom:5px;text-transform:uppercase;letter-spacing:.6px}
.fnote{font-size:12px;color:var(--mu);line-height:1.4;font-style:italic}
.rep-scroll{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:12px}
.rcard{background:var(--wh);border-radius:var(--r);padding:14px;box-shadow:var(--sh)}
.rcard h3{font-family:'Inter',sans-serif;font-size:18px;color:var(--bld);margin-bottom:10px;font-weight:800;letter-spacing:.3px}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sbox{background:var(--sand);border-radius:10px;padding:10px;text-align:center;border-bottom:3px solid var(--bll)}
.snum{font-size:28px;font-weight:800;color:var(--bl);font-family:'Inter',sans-serif;letter-spacing:.5px}
.slbl{font-size:10px;color:var(--mu);margin-top:1px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.exp-btn{display:flex;align-items:center;gap:9px;padding:12px;border-radius:11px;background:var(--bll);border:2px solid var(--bl);color:var(--bld);font-size:14px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;width:100%}
.imp-btn{display:flex;align-items:center;gap:9px;padding:12px;border-radius:11px;background:var(--orl);border:2px solid var(--or);color:var(--ord);font-size:14px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;width:100%}
.urow{display:flex;justify-content:space-between;align-items:center;padding:8px 11px;background:var(--rel);border-radius:9px;font-size:13px;font-weight:500}
.trow{display:flex;justify-content:space-between;padding:7px 10px;background:var(--sand);border-radius:8px;font-size:12px}
.csv-drop{border:2px dashed var(--sand2);border-radius:12px;padding:24px;text-align:center;color:var(--mu);font-size:14px;cursor:pointer}
.csv-preview{max-height:160px;overflow-y:auto;font-size:12px;border:1px solid var(--sand2);border-radius:8px}
.csv-preview table{width:100%;border-collapse:collapse}
.csv-preview th{background:var(--bld);color:#fff;padding:5px 8px;font-size:11px;text-align:left}
.csv-preview td{padding:5px 8px;border-bottom:1px solid var(--sand2)}
#admin-overlay .sheet{background:var(--bld)}
#admin-overlay .mhdr{border-bottom-color:rgba(255,255,255,.15)}
#admin-overlay .mtitle{color:var(--or)}
#admin-overlay .mclose{background:rgba(255,255,255,.1);color:#fff}
.admin-body{padding:20px 16px;display:flex;flex-direction:column;align-items:center;gap:18px}
.admin-dots{display:flex;gap:12px}
.admin-dot{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.3);background:transparent;transition:all .15s}
.admin-dot.on{background:var(--or);border-color:var(--or)}
.admin-pad{display:grid;grid-template-columns:repeat(3,60px);gap:8px}
.apk{width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.14);color:#fff;font-size:20px;font-family:'Inter',sans-serif;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s}

// ── PREDICTIVE SUGGESTIONS ───────────────────────────────────────────────────
function getPredictive(){
  var now=new Date();
  var hour=now.getHours();
  var dow=now.getDay();
  var todayStr=now.toDateString();
  // Members already checked in today
  var checkedToday={};
  visits.forEach(function(v){
    if(new Date(v.ts).toDateString()===todayStr) checkedToday[v.memberId]=true;
  });
  // Score each member by how many times they checked in during this hour±1 on this day of week
  var scores={};
  visits.forEach(function(v){
    if(checkedToday[v.memberId]) return; // skip already checked in today
    var d=new Date(v.ts);
    if(d.getDay()===dow && Math.abs(d.getHours()-hour)<=1){
      scores[v.memberId]=(scores[v.memberId]||0)+1;
    }
  });
  // Sort members by score descending, take top 8
  return members
    .filter(function(m){return scores[m.id]&&!checkedToday[m.id];})
    .sort(function(a,b){return (scores[b.id]||0)-(scores[a.id]||0);})
    .slice(0,8);
}

function buildCiAlphaStrips(){
  // Last name strip - only letters with members not checked in today
  var todayStr=new Date().toDateString();
  var checkedToday={};
  visits.forEach(function(v){if(new Date(v.ts).toDateString()===todayStr) checkedToday[v.memberId]=true;});
  var lnLetters={};
  members.forEach(function(m){if(m.last&&!checkedToday[m.id]) lnLetters[m.last[0].toUpperCase()]=true;});
  var lnStrip=document.getElementById('ci-ln-strip'); if(!lnStrip) return;
  lnStrip.innerHTML=Object.keys(lnLetters).sort().map(function(l){
    return '<button class="ci-alpha-btn'+(ciLastAlpha===l?' on':'')+'" onclick="setCiLastAlpha(&quot;'+l+'&quot;)">'+l+'</button>';
  }).join('');
  // First name strip - only if last name selected
  var fnSection=document.getElementById('ci-fn-section');
  var fnStrip=document.getElementById('ci-fn-strip');
  if(ciLastAlpha&&fnSection&&fnStrip){
    fnSection.style.display='block';
    var fnLetters={};
    members.filter(function(m){return m.last&&m.last[0].toUpperCase()===ciLastAlpha&&!checkedToday[m.id];})
      .forEach(function(m){if(m.first) fnLetters[m.first[0].toUpperCase()]=true;});
    fnStrip.innerHTML=Object.keys(fnLetters).sort().map(function(l){
      return '<button class="ci-alpha-btn'+(ciFirstAlpha===l?' on':'')+'" onclick="setCiFirstAlpha(&quot;'+l+'&quot;)">'+l+'</button>';
    }).join('');
    // Update label
    var fnLabel=document.getElementById('ci-fn-label');
    if(fnLabel) fnLabel.textContent='Last name: '+ciLastAlpha+' — now tap first name initial';
  } else if(fnSection){
    fnSection.style.display='none';
  }
}

function setCiLastAlpha(l){
  if(ciLastAlpha===l){ciLastAlpha='';ciFirstAlpha='';}
  else{ciLastAlpha=l;ciFirstAlpha='';}
  renderCI();
}
function setCiFirstAlpha(l){
  ciFirstAlpha=ciFirstAlpha===l?'':l;
  renderCI();
}

function renderCI(){
  var el=document.getElementById('ci-list'); if(!el) return;
  buildCiAlphaStrips();
  var todayStr=new Date().toDateString();
  var checkedToday={};
  visits.forEach(function(v){if(new Date(v.ts).toDateString()===todayStr) checkedToday[v.memberId]=true;});

  if(!ciLastAlpha){
    // Show predictive suggestions
    var predicted=getPredictive();
    if(predicted.length){
      var nowH=new Date().getHours();
      var timeLabel=nowH<12?'this morning':nowH<17?'this afternoon':'this evening';
      el.innerHTML='<div class="ci-section-title" style="background:var(--sand)">&#x1F52E; Likely here '+timeLabel+' (based on history)</div>'
        +predicted.map(function(m){
          return '<div class="predict-card" onclick="openMember(&quot;'+m.id+'&quot;,true)">'
            +'<div class="mavatar">'+(m.last||'?')[0]+'</div>'
            +'<div class="minfo"><div class="mname">'+m.last+', '+m.first+'</div>'
            +'<div class="predict-meta">'+m.type+' &middot; '+(m.status==='paid'?'<span style="color:var(--gr);font-weight:700">Paid</span>':'<span style="color:var(--re);font-weight:700">'+m.status+'</span>')+'</div>'
            +'</div></div>';
        }).join('')
        +'<div class="ci-section-title" style="background:var(--sand);margin-top:6px">&#x1F4CB; Or tap a letter above to find anyone</div>';
    } else {
      el.innerHTML='<div class="empty"><div class="ico">&#x1F40A;</div><p>Tap a letter above to find a member.</p></div>';
    }
    return;
  }

  // Filter by last name initial
  var list=members.filter(function(m){return m.last&&m.last[0].toUpperCase()===ciLastAlpha;});
  // Filter by first name initial if selected
  if(ciFirstAlpha) list=list.filter(function(m){return m.first&&m.first[0].toUpperCase()===ciFirstAlpha;});
  list.sort(function(a,b){return a.last.localeCompare(b.last)||a.first.localeCompare(b.first);});

  // Auto-open if exactly one match
  if(list.length===1){
    el.innerHTML='';
    setTimeout(function(){openMember(list[0].id,true);},50);
    return;
  }

  el.innerHTML=list.length
    ?list.map(function(m){return cardHTML(m,true);}).join('')
    :'<div class="empty"><div class="ico">&#x1F50D;</div><p>No members found.</p></div>';
}

function renderDir(){
  if(!dirFilter) dirFilter='all';
  var list=members.slice();
  if(dirFilter==='unpaid') list=list.filter(function(m){return m.status!=='paid';});
  else if(dirFilter!=='all') list=list.filter(function(m){return m.type===dirFilter;});
  if(dirAlpha) list=list.filter(function(m){return (m.last||'').toUpperCase().startsWith(dirAlpha);});
  list.sort(function(a,b){return a.last.localeCompare(b.last)||a.first.localeCompare(b.first);});

  // Build alpha strip from available letters in current filtered list (pre-alpha filter)
  var baseList=members.slice();
  if(dirFilter==='unpaid') baseList=baseList.filter(function(m){return m.status!=='paid';});
  else if(dirFilter!=='all') baseList=baseList.filter(function(m){return m.type===dirFilter;});
  var availLetters={};
  baseList.forEach(function(m){if(m.last) availLetters[m.last[0].toUpperCase()]=true;});
  var activeLetters=Object.keys(availLetters).sort();
  var strip=document.getElementById('dir-alpha-strip');
  if(strip){
    var allBtnHtml='<button onclick="dirAlpha=\'\';renderDir()" style="padding:4px 10px;border-radius:7px;border:1.5px solid '+(dirAlpha===''?'var(--or)':'var(--sand2)')+';background:'+(dirAlpha===''?'var(--or)':'var(--sand)')+';font-size:11px;font-weight:700;color:'+(dirAlpha===''?'#fff':'var(--bl)')+';cursor:pointer">ALL</button>';
    strip.innerHTML=allBtnHtml+activeLetters.map(function(l){
      var active=dirAlpha===l;
      return '<button onclick="setAlpha(&quot;'+l+'&quot;)" class="alpha-btn'+(active?' on':'')+'">'+l+'</button>';
    }).join('');
  }

  var el=document.getElementById('dir-list');if(!el)return;
  if(!list.length){el.innerHTML='<div class="empty" style="padding:40px 0"><div class="ico">&#x1F50D;</div><p>No members match.</p></div>';return;}
  var grp={};
  list.forEach(function(m){var l=(m.last||'?')[0].toUpperCase();if(!grp[l])grp[l]=[];grp[l].push(m);});
  el.innerHTML=Object.keys(grp).sort().map(function(l){
    return'<div class="alpha-hdr">'+l+'</div>'+grp[l].map(function(m){return cardHTML(m,false);}).join('');
  }).join('');
}

function doCheckin(id){
  var m=members.find(function(x){return x.id===id;}); if(!m) return;
  if(m.status==='unpaid'&&getUnpaidDays(m.id)>=3){showToast('Check-in blocked &mdash; payment required','err');return;}
  // Require second adult name for Couples if missing
  if(getTypeConfig(m.type).requireSecond&&!(m.secFirst||m.secLast)){
    showToast('Please add the second adult\'s name first','warn'); return;
  }
  // Collect checked adults
  var checkedAdults=[];
  var a0=document.getElementById('chk-a0');
  if(a0&&a0.checked) checkedAdults.push(m.first+' '+m.last);
  var a1=document.getElementById('chk-a1');
  if(a1&&a1.checked) checkedAdults.push((m.secFirst||'')+' '+(m.secLast||''));
  // Collect checked children (existing)
  var checkedKids=[];
  (m.kids||[]).forEach(function(k,i){
    var chk=document.getElementById('chk-k'+i);
    if(chk&&chk.checked) checkedKids.push(k);
  });
  // Collect newly added kids
  var newKids=[];
  var addedItems=document.querySelectorAll('[data-new-kid]');
  addedItems.forEach(function(item){
    var chk=item.querySelector('input[type=checkbox]');
    if(chk&&chk.checked) newKids.push(item.dataset.newKid);
    else if(item.dataset.newKid) newKids.push(item.dataset.newKid); // always save new kids to membership
  });
  if(checkedAdults.length===0&&checkedKids.length===0&&newKids.length===0&&ciGuests===0){
    showToast('Select at least one person checking in','warn'); return;
  }
  if(ciGuests>0){
    var rem=m.guestsTotal-(m.guestsUsed||0);
    if(ciGuests<=rem) commitCheckin(m,checkedAdults,checkedKids,newKids,ciGuests,false);
    else if(rem>0) showGPModal(m,ciGuests,rem,'partial');
    else showGPModal(m,ciGuests,0,'purchase');
  } else {
    commitCheckin(m,checkedAdults,checkedKids,newKids,0,false);
  }
}

function commitCheckin(m,checkedAdults,checkedKids,newKids,passesUsed,purchased){
  var updKids=(m.kids||[]).concat(newKids);
  var updated=Object.assign({},m,{guestsUsed:(m.guestsUsed||0)+passesUsed,kids:updKids,children:updKids.length});
  saveMember(updated);
  var v={id:uid(),memberId:m.id,ts:new Date().toISOString(),
    adults:checkedAdults.length,children:checkedKids.length+newKids.length,
    checkedAdults:checkedAdults,checkedKids:checkedKids.concat(newKids),
    guestPasses:passesUsed,passesPurchased:purchased?passesUsed:0,
    whileUnpaid:(m.status==='unpaid')};
  saveVisit(v); ciGuests=0; closeMM();
  var p=[];
  if(checkedAdults.length) p.push(checkedAdults.join(', '));
  if(checkedKids.length||newKids.length) p.push((checkedKids.concat(newKids)).join(', '));
  if(passesUsed>0) p.push(passesUsed+' guest pass'+(passesUsed>1?'es':'')+(purchased?' purchased':''));
  showToast(m.first+' '+m.last+' checked in'+(p.length?' &middot; '+p.join(' &middot; '):''),'ok');
}

      +'<div style="display:flex;gap:12px;font-size:12px">'
      +'<label style="display:flex;align-items:center;gap:5px"><input type="checkbox" class="cfg-type-children" data-idx="'+i+'"'+(t.allowChildren?' checked':'')+'>Allow children</label>'
      +'<label style="display:flex;align-items:center;gap:5px"><input type="checkbox" class="cfg-type-require2nd" data-idx="'+i+'"'+(t.requireSecond?' checked':'')+'>Require 2nd adult</label>'
      +'</div>'
      +'</div>';
  }).join('');
  document.getElementById('st-body').innerHTML=
    '<div class="sec-lbl">Club Settings</div>'
    +'<div class="fg"><label class="fl">Club Name</label><input class="fi" id="cfg-clubname" value="'+CONFIG.clubName+'"></div>'
    +'<div class="fg"><label class="fl">Season Year</label><input class="fi" id="cfg-season" type="number" value="'+CONFIG.seasonYear+'"></div>'
    +'<div class="sec-lbl" style="margin-top:4px">Guest Pass Settings</div>'
    +'<div class="frow">'
    +'<div class="fg"><label class="fl">Price per Pass ($)</label><input class="fi" id="cfg-price" type="number" min="0" step="0.50" value="'+CONFIG.guestPrice+'"></div>'
    +'<div class="fg"><label class="fl">Unpaid Grace Days</label><input class="fi" id="cfg-grace" type="number" min="1" max="14" value="'+CONFIG.graceDays+'"></div>'
    +'</div>'
    +'<div class="sec-lbl" style="margin-top:4px">Notification Email</div>'
    +'<div class="fg"><label class="fl">Send payment alerts to</label><input class="fi" id="cfg-email" type="email" value="'+CONFIG.notifyEmail+'"></div>'
    +'<div class="sec-lbl" style="margin-top:4px">Membership Types</div>'
    +'<p class="fnote">Edit names, pass allotments, and rules for each membership type.</p>'
    +'<div id="cfg-types-list" style="display:flex;flex-direction:column;gap:8px">'+typesHTML+'</div>'
    +'<button onclick="addMemberType()" class="btn-s" style="margin-top:6px">&#xFF0B; Add Membership Type</button>'
    +'<button class="btn-p" style="margin-top:4px" onclick="saveAllConfig()">&#x1F4BE; Save All Settings</button>'
    +'<div class="sec-lbl" style="margin-top:4px">Change PIN</div>'
    +'<p class="fnote">This PIN protects delete, payment status changes, import/export, and settings.</p>'
    +'<div class="fg"><label class="fl">New PIN (4 digits)</label><input class="fi" id="np1" type="tel" maxlength="4" placeholder="New PIN"></div>'
    +'<div class="fg"><label class="fl">Confirm PIN</label><input class="fi" id="np2" type="tel" maxlength="4" placeholder="Confirm"></div>'
    +'<button class="btn-p" onclick="doChangePin()">&#x1F511; Update PIN</button>'
    +'<div class="sec-lbl" style="margin-top:4px">Season Reset</div>'
    +'<p class="fnote">Resets guest pass counts to 0 for all members. Profiles and visit history are kept.</p>'
    +'<button class="btn-d" onclick="doSeasonReset()">&#x1F504; Reset for New Season</button>';
  document.getElementById('st-overlay').classList.add('open');
});}

function saveAllConfig(){
  var newTypes=[];
  var labels=document.querySelectorAll('.cfg-type-label');
  labels.forEach(function(el){
    var i=parseInt(el.dataset.idx);
    var existing=CONFIG.membershipTypes[i]||{};
    newTypes.push({
      key: existing.key||el.value.replace(/\s+/g,''),
      label: el.value.trim(),
      adults: parseInt(document.querySelector('.cfg-type-maxadults[data-idx="'+i+'"]').value)||1,
      maxAdults: parseInt(document.querySelector('.cfg-type-maxadults[data-idx="'+i+'"]').value)||1,
      guestPasses: parseInt(document.querySelector('.cfg-type-passes[data-idx="'+i+'"]').value)||0,
      allowChildren: document.querySelector('.cfg-type-children[data-idx="'+i+'"]').checked,
      requireSecond: document.querySelector('.cfg-type-require2nd[data-idx="'+i+'"]').checked
    });
  });
  var newCfg={
    clubName: document.getElementById('cfg-clubname').value.trim()||CONFIG.clubName,
    seasonYear: parseInt(document.getElementById('cfg-season').value)||new Date().getFullYear(),
    guestPrice: parseFloat(document.getElementById('cfg-price').value)||CONFIG.guestPrice,
    graceDays: parseInt(document.getElementById('cfg-grace').value)||CONFIG.graceDays,
    notifyEmail: document.getElementById('cfg-email').value.trim()||CONFIG.notifyEmail,
    membershipTypes: newTypes
  };
  saveConfig(newCfg);
  closeSettings();
}

function addMemberType(){
  var list=document.getElementById('cfg-types-list'); if(!list) return;
  var i=document.querySelectorAll('.cfg-type-label').length;
  var row=document.createElement('div');
  row.style.cssText='background:var(--sand);border-radius:9px;padding:10px 12px;display:flex;flex-direction:column;gap:6px;border:1px solid var(--sand2)';
  row.innerHTML='<div style="display:flex;align-items:center;gap:8px;justify-content:space-between">'
    +'<input class="fi cfg-type-label" data-idx="'+i+'" value="New Type" style="flex:1;font-weight:700" placeholder="Type name">'
    +'<button onclick="this.parentElement.parentElement.remove();renumberTypeInputs()" style="background:var(--rel);border:none;color:var(--re);width:28px;height:28px;border-radius:7px;cursor:pointer;font-size:14px;flex-shrink:0">&#x2715;</button>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">'
    +'<div class="fg"><label class="fl">Guest Passes</label><input class="fi cfg-type-passes" data-idx="'+i+'" type="number" min="0" value="0"></div>'
    +'<div class="fg"><label class="fl">Max Adults</label><input class="fi cfg-type-maxadults" data-idx="'+i+'" type="number" min="1" max="2" value="1"></div>'
    +'</div>'
    +'<div style="display:flex;gap:12px;font-size:12px">'
    +'<label style="display:flex;align-items:center;gap:5px"><input type="checkbox" class="cfg-type-children" data-idx="'+i+'">Allow children</label>'
    +'<label style="display:flex;align-items:center;gap:5px"><input type="checkbox" class="cfg-type-require2nd" data-idx="'+i+'">Require 2nd adult</label>'
    +'</div>';
  list.appendChild(row);
}

function removeMemberType(idx){
  var labels=document.querySelectorAll('.cfg-type-label');
  if(labels.length<=1){showToast('Must have at least one membership type','warn');return;}
  labels[idx].closest('div[style]').remove();
  renumberTypeInputs();
}

function renumberTypeInputs(){
  var labels=document.querySelectorAll('.cfg-type-label');
  labels.forEach(function(el,i){
    el.dataset.idx=i;
    var parent=el.closest('div[style]');
    parent.querySelectorAll('[data-idx]').forEach(function(inp){inp.dataset.idx=i;});
  });
}
function closeSettings(){document.getElementById('st-overlay').classList.remove('open');}
function doChangePin(){var p1=document.getElementById('np1').value;var p2=document.getElementById('np2').value;if(!/^\d{4}$/.test(p1)){showToast('PIN must be exactly 4 digits','warn');return;}if(p1!==p2){showToast('PINs do not match','warn');return;}setPin(p1);closeSettings();showToast('PIN updated');}
function enablePin(){document.getElementById('pin-screen').classList.remove('hidden');closeSettings();showToast('PIN enabled');}
function doSeasonReset(){if(!confirm('Reset all guest pass counts for the new season?'))return;members=members.map(function(m){return Object.assign({},m,{guestsUsed:0,guestsTotal:GUEST_PASSES[m.type]!==undefined?GUEST_PASSES[m.type]:m.guestsTotal});});lSet('gsc_members',members);renderAll();closeSettings();showToast('Season reset complete');}
</script>
</body>
</html>
